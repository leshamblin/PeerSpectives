<style>
  :root {
    --app-bg: #f6f7f8;
    --card-bg: #ffffff;
    --card-shadow: 0 14px 40px rgba(76, 79, 84, 0.13);
    --border: #d7d9da;
    --ink: #1f1f1f;
    --ink-soft: #4c4f54;
    --ink-subtle: #6a6c70;
    --accent: #cc0000;
    --accent-soft: #990000;
    --accent-bg: #fce4e4;
    --slider-base: #d7d9da;
    --slider-fill: #117a3a;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --font-base: 'Inter', 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html,
  body {
    height: 100%;
    margin: 0;
    font-family: var(--font-base);
    background: var(--app-bg);
    color: var(--ink);
  }

  * {
    box-sizing: border-box;
  }

  .app-shell {
    max-width: 960px;
    margin: 32px auto 80px;
    padding: 0 20px;
  }

  .page-title {
    font-size: 30px;
    font-weight: 700;
    color: var(--accent);
    margin: 0 0 8px;
    letter-spacing: 0.02em;
    text-align: center;
  }

  .intro-header {
    padding: 26px 32px 10px;
    margin-bottom: 8px;
    text-align: center;
  }

  .intro-copy {
    margin: 0;
    color: var(--ink-subtle);
    font-size: 15px;
    line-height: 1.5;
    text-align: center;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(215, 217, 218, 0.6);
    padding: 32px 36px;
    margin-bottom: 26px;
  }

  .intro-header + .identity-card {
    margin-top: 0;
  }

  .login-card h2 {
    margin: 0 0 10px;
    color: var(--accent);
  }

  .card-intro {
    margin: 0 0 20px;
    color: var(--ink-subtle);
  }

  .user-info {
    display: grid;
    gap: 8px;
    padding: 16px 18px;
    border-radius: var(--radius-md);
    background: rgba(204, 0, 0, 0.06);
    border: 1px solid rgba(204, 0, 0, 0.12);
    margin-bottom: 22px;
  }

  .kv {
    font-size: 14px;
    color: var(--ink-soft);
  }

  .kv span:first-child {
    font-weight: 600;
    color: var(--ink);
    margin-right: 6px;
  }

  label.field-label {
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }

  select,
  textarea,
  input[type='range'] {
    width: 100%;
    font-family: inherit;
  }

  select {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: #f8fafc;
    font-size: 15px;
  }

  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.16);
  }

  .form-nav {
    margin-top: 24px;
    display: flex;
    justify-content: flex-end;
  }

  .identity-card .identity-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .identity-card {
    background: #fff;
    border: 1px solid rgba(215, 217, 218, 0.6);
  }

  .reviewee-card {
    background: rgba(204, 0, 0, 0.06);
    border: 1px solid rgba(204, 0, 0, 0.12);
  }

  .reviewee-line {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px;
    margin: 0;
  }

  .reviewee-line h3 {
    margin: 0;
    font-size: 18px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .reviewee-line h3 span:first-child {
    font-weight: 700;
  }

  .reviewee-line h3 span:last-child {
    font-weight: 500;
  }

  .reviewee-link a {
    margin-left: 0;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 10px;
    padding: 8px 18px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-soft) 100%);
    box-shadow: 0 10px 20px rgba(153, 0, 0, 0.25);
  }

  .reviewee-slides {
    margin-top: 8px;
  }

  .reviewee-slides .slides-link {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
  }

  .kv-subline {
    display: block;
    margin-left: 0;
    margin-top: 4px;
    font-weight: 500;
    color: var(--ink-soft);
  }

  .kv-subline span {
    font-weight: 600;
    color: var(--ink);
  }

  .kv-inline {
    margin-left: 24px;
    font-weight: 500;
    color: var(--ink-soft);
  }

  .kv-inline span {
    margin-left: 4px;
  }

  .kv-inline span:first-child {
    font-weight: 600;
    color: var(--ink);
  }

  .kv-inline span:last-child {
    font-weight: 500;
    color: var(--ink);
  }

  .message {
    margin-top: 16px;
    font-size: 15px;
    color: var(--ink);
  }

  #afterSubmit {
    margin-top: 24px;
  }

  .message.error {
    color: var(--accent);
  }

  .hidden {
    display: none !important;
  }

  .access-error {
    padding: 16px 20px;
    border-radius: var(--radius-md);
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid rgba(204, 0, 0, 0.35);
    font-weight: 600;
    margin-bottom: 24px;
  }

  #rubric .section-card {
    margin-bottom: 24px;
  }

  .section-card h3 {
    margin: 0 0 8px;
    color: var(--accent);
  }

  .instructions-card {
    margin-bottom: 24px;
  }

  .question-card {
    padding: 24px 0 28px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.24);
  }
  .question-card:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .question-card.scale-question .question-row {
    display: grid;
    grid-template-columns: minmax(220px, 0.9fr) minmax(320px, 1.4fr) auto;
    align-items: center;
    gap: 24px;
  }

  .question-card.question-info {
    padding-top: 12px;
    padding-bottom: 12px;
  }

  .question-text h4 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
  }
  .question-text p {
    margin: 8px 0 0;
    color: var(--ink-subtle);
    font-size: 15px;
    line-height: 1.45;
  }

  .slider-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .slider-track {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .slider-shell {
    position: relative;
    padding: 6px 0;
  }
  .slider-shell .noUi-target {
    border: none;
    box-shadow: inset 0 0 0 1px rgba(204, 0, 0, 0.14);
    background: #d7d9da;
    height: 10px;
    border-radius: 999px;
  }
  .slider-shell .noUi-connects {
    border-radius: 999px;
    overflow: hidden;
  }
  .slider-shell .noUi-connect {
    background: linear-gradient(90deg, rgba(204, 0, 0, 0.18) 0%, rgba(204, 0, 0, 0.45) 100%);
  }
  .slider-shell.is-active .noUi-connect {
    background: linear-gradient(90deg, rgba(47, 138, 79, 0.45) 0%, rgba(47, 138, 79, 0.9) 100%);
  }
  .slider-shell .noUi-handle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #ffffff;
    border: 3px solid var(--accent);
    box-shadow: 0 6px 16px rgba(153, 0, 0, 0.3);
    top: -9px;
  }
  .slider-shell .noUi-handle:before,
  .slider-shell .noUi-handle:after {
    display: none;
  }

  .ticks {
    position: relative;
    width: 100%;
    height: 24px;
    font-size: 13px;
    font-weight: 600;
    color: #4c4f54;
  }
  .ticks span {
    position: absolute;
    top: 14px;
    transform: translateX(-50%);
    text-align: center;
  }
  .ticks span::before {
    content: '';
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 12px;
    background: rgba(204, 0, 0, 0.38);
    border-radius: 1px;
  }

  .question-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 14px;
    flex-wrap: wrap;
  }
  .btn-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-na {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(31, 31, 31, 0.28);
    background: linear-gradient(180deg, #f8f8f8 0%, #d9d9d9 100%);
    color: #1f1f1f;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: box-shadow .15s ease, transform .15s ease;
  }
  .btn-na:hover {
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
    transform: translateY(-1px);
  }
  .btn-na.active {
    background: linear-gradient(180deg, #e3e3e3 0%, #c2c2c2 100%);
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.18);
  }
  .btn-pill {
    border: none;
    padding: 6px 16px;
    border-radius: 999px;
    background: #eceef0;
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease;
  }
  .btn-pill:hover {
    background: #d6d8da;
  }
  .value-pill {
    font-size: 18px;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
    color: #cc0000;
  }

  .question-card.missing textarea {
    border-color: rgba(185, 28, 28, 0.6) !important;
    box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.18) !important;
  }
  .question-card.missing .slider-shell .noUi-target {
    box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.18) !important;
    border: 1px solid rgba(185, 28, 28, 0.6) !important;
  }
  .question-card.missing .slider-shell .noUi-handle {
    border-color: rgba(185, 28, 28, 0.78) !important;
  }

  textarea {
    min-height: 140px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: #f8fafc;
    font-size: 15px;
    line-height: 1.45;
    resize: vertical;
    margin-top: 14px;
  }

  .form-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
  }

  .score-summary {
    font-size: 16px;
    font-weight: 600;
    display: none;
    margin-right: auto;
  }

  .btn-primary {
    padding: 12px 26px;
    border-radius: 999px;
    border: none;
    font-weight: 600;
    font-size: 15px;
    color: #fff;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-soft) 100%);
    box-shadow: 0 14px 34px rgba(153, 0, 0, 0.26);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 18px 40px rgba(153, 0, 0, 0.32);
  }

  .btn-primary[disabled] {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-secondary {
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    padding: 10px 20px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-spinner {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 3px solid rgba(255, 255, 255, 0.35);
    border-top-color: #fff;
    animation: spin 0.9s linear infinite;
    display: none;
  }

  .btn-primary.loading .btn-spinner {
    display: inline-block;
  }

  #toast {
    position: fixed;
    top: 28px;
    right: 30px;
    padding: 14px 20px;
    border-radius: var(--radius-md);
    font-weight: 600;
    color: #fff;
    display: none;
    z-index: 1000;
  }

  #toast.show {
    display: block;
    animation: fadeToast 3.4s ease forwards;
  }

  #toast.success {
    background: #117a3a;
  }

  #toast.error {
    background: var(--accent);
  }

  .toast-card {
    background: #fff;
    border-radius: var(--radius-lg);
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(215, 217, 218, 0.7);
    padding: 28px 32px;
    text-align: center;
  }

  .toast-card .toast-title {
    margin: 0 0 10px;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .toast-card .toast-count {
    margin: 0 0 12px;
    font-size: 16px;
    color: var(--ink);
    font-weight: 600;
  }

  .toast-card .toast-link {
    margin: 0 0 18px;
    font-size: 14px;
  }

  .toast-card .toast-link a {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
  }

  .toast-card .toast-actions {
    display: flex;
    justify-content: center;
  }

  @keyframes fadeToast {
    0% {
      opacity: 0;
      transform: translateY(-12px);
    }
    12% {
      opacity: 1;
      transform: translateY(0);
    }
    88% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: translateY(-12px);
    }
  }

  #pageLoading {
    position: fixed;
    inset: 0;
    background: rgba(246, 247, 248, 0.94);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 900;
    flex-direction: column;
    gap: 16px;
  }

  #pageLoading .spinner-ring {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 5px solid rgba(204, 0, 0, 0.2);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }

  .btn-primary.loading {
    cursor: progress;
  }

  .loading-text {
    margin: 0;
    font-size: 15px;
    color: var(--ink);
    font-weight: 600;
  }

  .loading-retry.hidden {
    display: none;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  @media (max-width: 760px) {
    .card {
      padding: 24px;
    }
    .identity-card .identity-bar { flex-direction: column; gap: 8px; }
    .form-footer { flex-direction: column; align-items: stretch; }
    .btn-primary,
    .btn-secondary { width: 100%; justify-content: center; }
    .question-card.scale-question .question-row { grid-template-columns: 1fr; gap: 18px; }
    .question-actions { justify-content: flex-start; }
  }
</style>
